name: Build QR Alarm Clock APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter version
        run: flutter --version

      - name: Scaffold fresh Flutter project
        run: flutter create --org com.example --project-name qr_alarm_clock app

      - name: Copy app source into scaffold
        run: |
          rm -rf app/lib
          cp -r lib app/lib
          cp pubspec.yaml app/pubspec.yaml
          mkdir -p app/assets
          if [ -d assets ]; then cp -r assets/. app/assets/; fi
          cp android/app/src/main/AndroidManifest.xml \
             app/android/app/src/main/AndroidManifest.xml

      - name: Ensure minSdk 21 (required by mobile_scanner)
        run: |
          if [ -f app/android/app/build.gradle.kts ]; then
            printf '\nandroid {\n    defaultConfig {\n        minSdk = 21\n    }\n}\n' >> app/android/app/build.gradle.kts
          elif [ -f app/android/app/build.gradle ]; then
            printf '\nandroid {\n    defaultConfig {\n        minSdkVersion 21\n    }\n}\n' >> app/android/app/build.gradle
          else
            echo "Could not find build.gradle or build.gradle.kts"
            exit 1
          fi

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build release APK
        working-directory: app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-alarm-clock-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
